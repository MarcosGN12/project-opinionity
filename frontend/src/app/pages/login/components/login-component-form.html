<div class="flex items-center justify-center min-h-screen bg-gray-100 overflow-hidden">
  <div class="w-full max-w-md p-6 shadow-lg rounded-2xl !border-b-6 !border-b-blue-600">
    <header class="flex flex-col items-center">
      <div class="flex flex-col items-center font-bold p-2">
        <span class="text-black my-icon">
          <!-- <lifters-icon name="User" [size]="60" class="my-icon"></lifters-icon> -->
        </span>
        <h1 class="mt-4 font-extrabold text-xl text-blue-500">Login</h1>
      </div>
      <p class="text-blue-400 p-2 font-extrabold">Improve your lifestyle</p>
    </header>

    <div class="mt-4 space-y-4">
      <form [formGroup]="loginForm">
        <div>
          <div class="flex flex-col pb-4">
            <label class="text-amber-950">Email</label>
            <label class="input validator w-full bg-white">
              <!-- <lifters-icon name="User" class="text-gray-500 my-icon" [size]="24"></lifters-icon> -->
              <input
                class="text-black"
                type="text"
                required
                placeholder="Email"
                formControlName="email"
              />
            </label>
          </div>

          <div class="flex flex-col pb-4">
            <label class="text-black">Password</label>
            <label class="input validator w-full bg-white">
              <!-- <lifters-icon name="Lock" class="text-gray-500 my-icon" [size]="24"></lifters-icon> -->
              <input
                class="text-black"
                id="password"
                type="{{ showPassword ? 'text' : 'password' }}"
                required
                placeholder="Password"
                formControlName="password"
              />
              <span
                (click)="togglePasswordVisibility()"
                class="text-gray-500 my-icon hover:cursor-pointer"
              >
                <!-- <lifters-icon name="Eye" class="text-gray-500 my-icon" [size]="24"></lifters-icon> -->
              </span>
            </label>
          </div>
        </div>

        <div>
          <span class="flex justify-center">
            <a class="text-lg text-blue-400 font-extrabold hover:text-blue-700 transition" href=""
              >Forgot password?</a
            >
          </span>
        </div>

        <div>
          <button
            (click)="onLogin()"
            class="h-10 bg-blue-600 text-white shadow-black-400 font-extrabold rounded-md hover:bg-blue-500 cursor-pointer transition w-full text-lg"
          >
            Login
          </button>
        </div>
      </form>

      <div class="relative flex items-center">
        <div class="grow border-t border-gray-400"></div>
        <span class="shrink mx-4 px-4 text-lg text-gray-500">OR</span>
        <div class="grow border-t border-gray-400"></div>
      </div>

      <div class="flex flex-col items-center">
        <p class="text-gray-500 pb-2">New to our plataform?</p>

        <a class="text-blue-600 pt-2" href="">Create an account</a>
      </div>
    </div>
  </div>
</div>
